<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biology Study Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  padding: 20px;
  padding-bottom: 60px;
}

/* HEADINGS */
h1 { text-align: center; }
h2 { color: #38bdf8; margin-top: 25px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
h3 { margin-top: 10px; color: #94a3b8; text-align: center; font-size: 16px; }

/* LIST */
ul { list-style: none; padding-left: 0; }
li { margin: 8px 0; }
input[type="checkbox"] { margin-right: 10px; cursor: pointer; }

/* BUTTON */
button {
  padding: 12px 25px;
  background: #38bdf8;
  border: none;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
}

/* TITLE */
.main-title {
  font-family: 'Orbitron', sans-serif;
  text-align: center;
  font-size: 32px;
  background: linear-gradient(90deg, #38bdf8, #22d3ee);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ONE SHOT BUTTON */
.link-btn {
  display: block;
  width: fit-content;
  margin: 15px auto;
  padding: 10px 20px;
  background: #22d3ee;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  text-decoration: none;
  transition: 0.3s;
}
.link-btn:hover { transform: scale(1.05); }

.watermark {
  display: block;
  text-align: center;
  font-size: 11px;
  color: #94a3b8;
  margin-top: 5px;
  text-decoration: none;
}

/* 🔥 GLASS LOGIN BOX */
#login-screen {
  display: flex;
  justify-content: center;
  margin-top: 30px;
}

.glass-box {
  width: 280px;
  padding: 25px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  text-align: center;
}

.glass-box input {
  width: 100%;
  padding: 10px;
  margin: 12px 0;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  color: white;
}

.glass-box button {
  width: 100%;
  margin-top: 10px;
}

/* TRACKER */
#tracker {
  display: none;
  max-width: 600px;
  margin: 0 auto;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: #22d3ee;
  color: black;
  padding: 10px 20px;
  border-radius: 6px;
  opacity: 0;
}
.toast.show { opacity: 1; }

.my-watermark {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<h1 class="main-title">+2 Biology Study Tracker</h1>

<a href="https://unfav-mibssm.github.io/Biology-2/" target="_blank" class="link-btn">
   One Shot
</a>
<a href="https://mibsam.online" target="_blank" class="watermark">
  one shot © mibsam.online
</a>

<!-- 🔥 GLASS LOGIN -->
<div id="login-screen">
  <div class="glass-box">
    <h3>Enter Your Name To Save Progress</h3>
    <input type="text" id="nameInput" placeholder="Your Name">
    <button onclick="startTracker()">Enter</button>
  </div>
</div>

<!-- TRACKER -->
<div id="tracker">

<h2>UNIT VI: REPRODUCTION</h2>
<ul>
<li><label><input type="checkbox"> Microsporogenesis</label></li>
<li><label><input type="checkbox"> Megasporogenesis</label></li>
<li><label><input type="checkbox"> Pollination</label></li>
<li><label><input type="checkbox"> Double Fertilization</label></li>
<li><label><input type="checkbox"> Endosperm & Embryo</label></li>
</ul>

<h2>UNIT VII: GENETICS</h2>
<ul>
<li><label><input type="checkbox"> Mendel Laws</label></li>
<li><label><input type="checkbox"> DNA & Replication</label></li>
<li><label><input type="checkbox"> Evolution Concepts</label></li>
</ul>

<button onclick="saveProgress()" style="width:100%">Save Progress</button>

</div>

<div id="toast" class="toast">Saved!</div>
<a href="#" class="my-watermark">© Bald-e 2026</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, setDoc, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "studytracker-9e7ae.firebaseapp.com",
  projectId: "studytracker-9e7ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "";

window.startTracker = async function () {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return alert("Enter name");

  currentUser = name;

  const ref = doc(db, "biology_students", name);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const saved = snap.data().checked || [];
    document.querySelectorAll('input[type="checkbox"]').forEach(box => {
      const topic = box.parentElement.textContent.trim();
      if (saved.includes(topic)) box.checked = true;
    });
  }

  document.getElementById("login-screen").style.display="none";
  document.getElementById("tracker").style.display="block";
};

window.saveProgress = async function () {
  const checked = [];
  document.querySelectorAll('input[type="checkbox"]').forEach(box => {
    if (box.checked) {
      const topic = box.parentElement.textContent.trim();
      checked.push(topic);
    }
  });

  await setDoc(doc(db,"biology_students",currentUser),{
    checked: checked
  });

  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),1500);
};
</script>

</body>
</html>
