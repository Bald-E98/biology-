<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biology Study Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
  padding: 20px;
  padding-bottom: 60px;
}

h1 { text-align: center; }
h2 { color: #38bdf8; margin-top: 25px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
h3 { margin-top: 15px; color: #94a3b8; }
ul { list-style: none; padding-left: 0; }
li { margin: 8px 0; }
input[type="checkbox"] { margin-right: 10px; cursor: pointer; }

button {
  margin-top: 20px;
  padding: 12px 25px;
  background: #38bdf8;
  border: none;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  text-align: center;
  font-size: 32px;
  background: linear-gradient(90deg, #38bdf8, #22d3ee);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

#login-screen { text-align: center; margin-top: 40px; }
#tracker { display: none; max-width: 600px; margin: 0 auto; }

.toast {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: #22d3ee;
  color: black;
  padding: 10px 20px;
  border-radius: 6px;
  opacity: 0;
}

.toast.show { opacity: 1; }

.my-watermark {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<h1 class="main-title">+2 Biology Study Tracker</h1>

<div id="login-screen">
  <h3>Enter Your Name</h3>
  <input type="text" id="nameInput" placeholder="Your Name">
  <br>
  <button onclick="startTracker()">Enter</button>
</div>

<div id="tracker">

<h2>UNIT VI: REPRODUCTION</h2>

<h3>Flowering Plants</h3>
<ul>
<li><label><input type="checkbox" id="bio1"> Microsporogenesis</label></li>
<li><label><input type="checkbox" id="bio2"> Megasporogenesis</label></li>
<li><label><input type="checkbox" id="bio3"> Pollination</label></li>
<li><label><input type="checkbox" id="bio4"> Double Fertilization</label></li>
<li><label><input type="checkbox" id="bio5"> Endosperm & Embryo</label></li>
</ul>

<h3>Human Reproduction</h3>
<ul>
<li><label><input type="checkbox" id="bio6"> Systems</label></li>
<li><label><input type="checkbox" id="bio7"> Gametogenesis</label></li>
<li><label><input type="checkbox" id="bio8"> Menstrual Cycle</label></li>
<li><label><input type="checkbox" id="bio9"> Fertilization</label></li>
<li><label><input type="checkbox" id="bio10"> Parturition</label></li>
</ul>

<h3>Reproductive Health</h3>
<ul>
<li><label><input type="checkbox" id="bio11"> Contraception</label></li>
<li><label><input type="checkbox" id="bio12"> MTP</label></li>
<li><label><input type="checkbox" id="bio13"> STIs</label></li>
<li><label><input type="checkbox" id="bio14"> IVF/ZIFT/GIFT</label></li>
</ul>

<h2>UNIT VII: GENETICS</h2>
<ul>
<li><label><input type="checkbox" id="bio15"> Mendel Laws</label></li>
<li><label><input type="checkbox" id="bio16"> Co-dominance</label></li>
<li><label><input type="checkbox" id="bio17"> DNA & Replication</label></li>
<li><label><input type="checkbox" id="bio18"> Transcription & Translation</label></li>
<li><label><input type="checkbox" id="bio19"> Evolution Concepts</label></li>
</ul>

<h2>UNIT VIII: HUMAN WELFARE</h2>
<ul>
<li><label><input type="checkbox" id="bio20"> Diseases & Immunity</label></li>
<li><label><input type="checkbox" id="bio21"> AIDS & Cancer</label></li>
<li><label><input type="checkbox" id="bio22"> Microbes Uses</label></li>
</ul>

<h2>UNIT IX: BIOTECH</h2>
<ul>
<li><label><input type="checkbox" id="bio23"> PCR</label></li>
<li><label><input type="checkbox" id="bio24"> Vectors</label></li>
<li><label><input type="checkbox" id="bio25"> Applications</label></li>
</ul>

<h2>UNIT X: ECOLOGY</h2>
<ul>
<li><label><input type="checkbox" id="bio26"> Population</label></li>
<li><label><input type="checkbox" id="bio27"> Ecosystem</label></li>
<li><label><input type="checkbox" id="bio28"> Biodiversity</label></li>
</ul>

<button onclick="saveProgress()" style="width:100%">Save Progress</button>

</div>

<div id="toast" class="toast">Saved!</div>

<a href="#" class="my-watermark">© Bald-e 2026</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, setDoc, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "studytracker-9e7ae.firebaseapp.com",
  projectId: "studytracker-9e7ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "";

window.startTracker = async function () {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return alert("Enter name");

  currentUser = name;

  const ref = doc(db, "biology_students", name);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const saved = snap.data().checked || [];
    document.querySelectorAll("input").forEach(box=>{
      if(saved.includes(box.id)) box.checked = true;
    });
  }

  document.getElementById("login-screen").style.display="none";
  document.getElementById("tracker").style.display="block";
};

window.saveProgress = async function () {
  const checked = [];
  document.querySelectorAll("input").forEach(box=>{
    if(box.checked) checked.push(box.id);
  });

  await setDoc(doc(db,"biology_students",currentUser),{
    checked: checked
  });

  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),1500);
};
</script>

</body>
</html>
